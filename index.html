<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>設計部工作項目目錄</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@400;500&display=swap" rel="stylesheet">
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
:root {
  --bg:#ffffff; --bg-sec:#f5f5f3; --bg-ter:#eeede9;
  --text:#1a1a1a; --text-sec:#6b6b68; --text-ter:#9b9b97;
  --border:rgba(0,0,0,0.1); --border-med:rgba(0,0,0,0.18); --border-str:rgba(0,0,0,0.28);
  --radius-md:8px; --radius-lg:12px;
  --font:'Noto Sans TC', system-ui, sans-serif;
}
@media (prefers-color-scheme: dark) {
  :root { --bg:#1c1c1a; --bg-sec:#252523; --bg-ter:#2e2e2b; --text:#f0efe9; --text-sec:#9b9b97; --text-ter:#6b6b68; --border:rgba(255,255,255,0.1); --border-med:rgba(255,255,255,0.18); --border-str:rgba(255,255,255,0.28); }
  .b-大型專案{background:#3C3489!important;color:#CECBF6!important}
  .b-電商{background:#0C447C!important;color:#B5D4F4!important}
  .b-其他部門{background:#085041!important;color:#9FE1CB!important}
  .f-定期{background:#27500A!important;color:#C0DD97!important}
  .f-不定期{background:#633806!important;color:#FAC775!important}
  .f-大型{background:#712B13!important;color:#F5C4B3!important}
}
body { font-family:var(--font); background:var(--bg-ter); color:var(--text); min-height:100vh; padding:2rem 1rem; }
.container { max-width:1100px; margin:0 auto; }
.topbar { display:flex; align-items:flex-start; justify-content:space-between; margin-bottom:1.5rem; flex-wrap:wrap; gap:12px; }
.topbar h1 { font-size:20px; font-weight:500; }
.topbar p { font-size:13px; color:var(--text-sec); margin-top:2px; }
.topbar-right { display:flex; align-items:center; gap:8px; }
.user-pill { display:none; align-items:center; gap:8px; font-size:12px; color:var(--text-sec); background:var(--bg); border:0.5px solid var(--border-med); border-radius:99px; padding:4px 12px; }
.logout-btn { font-size:12px; background:none; border:none; color:var(--text-sec); cursor:pointer; font-family:var(--font); padding:0; }
.logout-btn:hover { color:var(--text); }
.btn-admin { font-size:13px; padding:6px 14px; border:0.5px solid var(--border-med); border-radius:var(--radius-md); background:var(--bg); color:var(--text-sec); cursor:pointer; font-family:var(--font); }
.btn-admin:hover { background:var(--bg-sec); }
.search-row { display:flex; gap:8px; margin-bottom:1rem; }
.search-row input { flex:1; height:38px; padding:0 12px; font-size:14px; font-family:var(--font); border:0.5px solid var(--border-med); border-radius:var(--radius-md); background:var(--bg); color:var(--text); outline:none; }
.search-row input:focus { border-color:var(--border-str); }
.filter-row { display:flex; gap:6px; margin-bottom:1.25rem; flex-wrap:wrap; }
.fbtn { padding:5px 14px; font-size:12px; border:0.5px solid var(--border); border-radius:99px; background:transparent; color:var(--text-sec); cursor:pointer; font-family:var(--font); }
.fbtn.on { border-color:var(--border-str); color:var(--text); font-weight:500; }
.fbtn:hover { border-color:var(--border-med); }

/* badges */
.b-大型專案{background:#EEEDFE;color:#3C3489} .b-電商{background:#E6F1FB;color:#0C447C} .b-其他部門{background:#E1F5EE;color:#085041}
.freq-badge { font-size:11px; padding:2px 8px; border-radius:99px; white-space:nowrap; }
.f-定期{background:#EAF3DE;color:#3B6D11} .f-不定期{background:#FAEEDA;color:#854F0B} .f-大型{background:#FAECE7;color:#993C1D}
.empty { padding:2.5rem; text-align:center; font-size:14px; color:var(--text-sec); background:var(--bg); border:0.5px solid var(--border); border-radius:var(--radius-lg); }

/* 3-col grid */
.col-grid { display:grid; grid-template-columns:repeat(3,1fr); gap:16px; align-items:start; }
@media(max-width:700px){ .col-grid { grid-template-columns:1fr; } }
.col-card { background:var(--bg); border:0.5px solid var(--border); border-radius:var(--radius-lg); overflow:hidden; }
.col-header { padding:12px 14px 10px; border-bottom:0.5px solid var(--border); }
.col-cat-badge { font-size:11px; font-weight:500; padding:2px 9px; border-radius:99px; display:inline-block; margin-bottom:6px; }
.col-title { font-size:15px; font-weight:500; color:var(--text); }
.sub-block { border-bottom:0.5px solid var(--border); }
.sub-block:last-child { border-bottom:none; }
.sub-label { font-size:11px; font-weight:500; color:var(--text-ter); padding:8px 14px 4px; letter-spacing:.04em; }
.item-row { display:flex; align-items:center; gap:6px; padding:6px 14px; border-bottom:0.5px solid var(--border); }
.item-row:last-child { border-bottom:none; }
.item-row:hover { background:var(--bg-sec); }
.item-name { flex:1; font-size:12px; color:var(--text-sec); line-height:1.4; }
.item-notes { font-size:11px; color:var(--text-ter); }

/* admin buttons */
.act-btn { width:26px; height:26px; padding:0; display:none; align-items:center; justify-content:center; font-size:13px; border:none; background:none; cursor:pointer; border-radius:var(--radius-md); color:var(--text-ter); }
.act-btn:hover { background:var(--bg-ter); color:var(--text-sec); }
.act-btn.danger:hover { color:#A32D2D; }
body.admin-mode .act-btn { display:flex; }

/* add form */
.add-form-wrap { display:none; background:var(--bg-sec); border-radius:var(--radius-lg); padding:1.25rem; margin-bottom:1.5rem; }
body.admin-mode .add-form-wrap { display:block; }
.add-form-title { font-size:13px; font-weight:500; color:var(--text-sec); margin-bottom:1rem; }
.form-grid { display:grid; grid-template-columns:1fr 1fr; gap:10px; margin-bottom:10px; }
.form-single { margin-bottom:10px; }
.form-grid label, .form-single label { font-size:12px; color:var(--text-sec); display:block; margin-bottom:4px; }
input[type="text"], input[type="password"], select { width:100%; height:36px; padding:0 10px; font-size:14px; font-family:var(--font); border:0.5px solid var(--border-med); border-radius:var(--radius-md); background:var(--bg); color:var(--text); outline:none; }
input:focus, select:focus { border-color:var(--border-str); }
button { height:34px; padding:0 16px; font-size:13px; font-family:var(--font); border:0.5px solid var(--border-med); border-radius:var(--radius-md); background:var(--bg); color:var(--text); cursor:pointer; }
button:hover { background:var(--bg-sec); }
.btn-primary { background:var(--text); color:var(--bg); border-color:var(--text); }
.btn-primary:hover { opacity:0.85; }
.form-actions { display:flex; gap:8px; justify-content:flex-end; align-items:center; margin-top:12px; }
.save-msg { font-size:12px; color:#3B6D11; }
.err-msg { font-size:12px; color:#A32D2D; }

/* account section */
.acct-wrap { display:none; margin-top:2rem; }
body.admin-mode.super-mode .acct-wrap { display:block; }
.acct-title { font-size:13px; font-weight:500; color:var(--text-sec); padding-bottom:6px; border-bottom:0.5px solid var(--border); margin-bottom:1rem; }
.panel { border:0.5px solid var(--border); border-radius:var(--radius-lg); overflow:hidden; background:var(--bg); }
.panel-row { display:flex; align-items:center; gap:10px; padding:10px 14px; border-bottom:0.5px solid var(--border); font-size:13px; }
.panel-row:last-child { border-bottom:none; }
.panel-row:hover { background:var(--bg-sec); }
.panel-row-name { flex:1; color:var(--text); }
.badge-admin { font-size:11px; padding:2px 8px; border-radius:99px; background:#EEEDFE; color:#3C3489; }
.badge-user  { font-size:11px; padding:2px 8px; border-radius:99px; background:var(--bg-sec); color:var(--text-sec); }

/* loading */
.loading { padding:3rem; text-align:center; font-size:14px; color:var(--text-sec); }

/* modal */
.modal-backdrop { display:none; position:fixed; inset:0; background:rgba(0,0,0,0.35); align-items:center; justify-content:center; z-index:200; }
.modal-backdrop.show { display:flex; }
.modal-box { background:var(--bg); border:0.5px solid var(--border-med); border-radius:var(--radius-lg); padding:1.75rem; width:300px; }
.modal-box h3 { font-size:15px; font-weight:500; margin-bottom:1rem; }
.modal-box label { font-size:12px; color:var(--text-sec); display:block; margin-bottom:4px; margin-top:10px; }
.modal-err { font-size:12px; color:#A32D2D; margin-top:8px; min-height:16px; }
.modal-actions { display:flex; gap:8px; justify-content:flex-end; margin-top:1rem; }

/* config banner */
.config-banner { background:#FEF3C7; border:0.5px solid #F59E0B; border-radius:var(--radius-md); padding:10px 14px; font-size:13px; color:#92400E; margin-bottom:1rem; display:none; }
.config-banner a { color:#92400E; font-weight:500; }
</style>
</head>
<body>
<div class="container">
  <div class="topbar">
    <div>
      <h1>設計部工作項目目錄</h1>
      <p>設計部承接的所有工作類型總覽</p>
    </div>
    <div class="topbar-right">
      <div class="user-pill" id="user-pill">
        <span id="user-label"></span>
        <span style="color:var(--border-med)">·</span>
        <button class="logout-btn" onclick="doLogout()">登出後台</button>
      </div>
      <button class="btn-admin" id="btn-admin" onclick="enterAdmin()">後台管理</button>
    </div>
  </div>

  <div class="config-banner" id="config-banner">
    ⚠️ 尚未設定 Google Sheets 網址，請先完成設定。<a href="#" onclick="showSetup()">查看說明</a>
  </div>

  <!-- 新增/編輯表單 -->
  <div class="add-form-wrap">
    <div class="add-form-title" id="form-title">新增項目</div>
    <div class="form-grid">
      <div><label>類別</label>
        <select id="f-cat"><option>大型專案</option><option>電商</option><option>其他部門</option></select>
      </div>
      <div><label>子類 / 發案部門</label>
        <input type="text" id="f-sub" placeholder="例：Kinto、業務、Bn">
      </div>
    </div>
    <div class="form-single"><label>項目名稱</label>
      <input type="text" id="f-name" placeholder="例：POP每月">
    </div>
    <div class="form-grid">
      <div><label>頻率</label>
        <select id="f-freq"><option>定期</option><option>不定期</option><option>大型</option></select>
      </div>
      <div><label>備註（選填）</label>
        <input type="text" id="f-notes" placeholder="例：每月例行">
      </div>
    </div>
    <div class="form-actions">
      <span class="save-msg" id="save-msg"></span>
      <span class="err-msg" id="form-err"></span>
      <button id="cancel-btn" style="display:none" onclick="cancelEdit()">取消</button>
      <button class="btn-primary" id="submit-btn" onclick="submitItem()">新增項目</button>
    </div>
  </div>

  <div class="search-row">
    <input type="text" id="search" placeholder="搜尋項目名稱、部門..." oninput="render()">
  </div>
  <div class="filter-row" id="cat-filters"></div>
  <div id="main-list"><div class="loading">載入中...</div></div>

  <!-- 帳號管理 -->
  <div class="acct-wrap">
    <div class="acct-title">帳號管理</div>
    <div style="background:var(--bg-sec);border-radius:var(--radius-lg);padding:1.25rem;margin-bottom:1rem">
      <div class="form-grid">
        <div><label>新帳號</label><input type="text" id="new-username" placeholder="帳號名稱"></div>
        <div><label>密碼</label><input type="password" id="new-password" placeholder="密碼"></div>
      </div>
      <div class="form-actions">
        <span class="err-msg" id="acct-err"></span>
        <span class="save-msg" id="acct-msg"></span>
        <button class="btn-primary" onclick="addAccount()">建立帳號</button>
      </div>
    </div>
    <div class="panel" id="account-list"></div>
  </div>
</div>

<!-- 登入 Modal -->
<div class="modal-backdrop" id="login-modal">
  <div class="modal-box">
    <h3>後台登入</h3>
    <label>帳號</label>
    <input type="text" id="m-user" placeholder="帳號" autocomplete="username">
    <label>密碼</label>
    <input type="password" id="m-pass" placeholder="密碼" autocomplete="current-password" onkeydown="if(event.key==='Enter')doLogin()">
    <div class="modal-err" id="m-err"></div>
    <div class="modal-actions">
      <button onclick="closeModal()">取消</button>
      <button class="btn-primary" onclick="doLogin()">登入</button>
    </div>
  </div>
</div>

<script>
// =============================================
// ★ 設定你的 Google Apps Script 網址
// =============================================
const API_URL = 'https://script.google.com/macros/s/AKfycbygIJRCqbz59YR-FzfJUdgGkN3jVZaLsHH95yNINZuyAuZZHvZ_7J18B_fVYyQn9sU3wQ/exec'; // 貼上你的 Apps Script 部署網址

const SUPER = { username:'lsdv.Design', password:'54708191' };
const USERS_KEY = 'design-dept-users';

let items = [];
let editId = null;
let activeCat = '全部';
let currentUser = null;

// ── API ──
function jsonp(url) {
  return new Promise((resolve, reject) => {
    const cb = '_cb' + Math.random().toString(36).slice(2);
    const script = document.createElement('script');
    const timer = setTimeout(() => {
      delete window[cb];
      if (script.parentNode) script.parentNode.removeChild(script);
      reject(new Error('timeout'));
    }, 10000);
    window[cb] = data => {
      clearTimeout(timer);
      delete window[cb];
      if (script.parentNode) script.parentNode.removeChild(script);
      resolve(data);
    };
    script.onerror = () => {
      clearTimeout(timer);
      delete window[cb];
      reject(new Error('script error'));
    };
    script.src = url + (url.includes('?') ? '&' : '?') + 'callback=' + cb;
    document.head.appendChild(script);
  });
}

async function apiGet() {
  const data = await jsonp(API_URL + '?action=getItems');
  return data.items || [];
}

async function apiPost(body) {
  const url = API_URL + '?action=' + body.action + '&payload=' + encodeURIComponent(JSON.stringify(body));
  return await jsonp(url);
}

// ── Load ──
async function loadItems() {
  if (!API_URL) {
    document.getElementById('config-banner').style.display = '';
    document.getElementById('main-list').innerHTML = '<div class="empty">請先設定 Google Sheets API 網址</div>';
    return;
  }
  try {
    document.getElementById('main-list').innerHTML = '<div class="loading">載入中...</div>';
    items = await apiGet();
    render();
  } catch(e) {
    console.error('載入失敗:', e);
    document.getElementById('main-list').innerHTML = '<div class="empty">載入失敗：' + e.message + '<br><small>請確認 Apps Script 已部署且存取權為「所有人」</small></div>';
  }
}

// ── Auth ──
function loadUsers() { try { return JSON.parse(localStorage.getItem(USERS_KEY)) || []; } catch(e) { return []; } }
function saveUsers(u) { try { localStorage.setItem(USERS_KEY, JSON.stringify(u)); } catch(e) {} }

function enterAdmin() {
  document.getElementById('m-user').value = '';
  document.getElementById('m-pass').value = '';
  document.getElementById('m-err').textContent = '';
  document.getElementById('login-modal').classList.add('show');
  setTimeout(() => document.getElementById('m-user').focus(), 50);
}
function closeModal() { document.getElementById('login-modal').classList.remove('show'); }

function doLogin() {
  const u = document.getElementById('m-user').value.trim();
  const p = document.getElementById('m-pass').value;
  document.getElementById('m-err').textContent = '';
  let role = null;
  if (u === SUPER.username && p === SUPER.password) { role = 'super'; }
  else { const users = loadUsers(); if (users.find(x => x.username===u && x.password===p)) role = 'user'; }
  if (!role) { document.getElementById('m-err').textContent = '帳號或密碼錯誤'; return; }
  currentUser = { username:u, role };
  closeModal();
  document.getElementById('user-label').textContent = u;
  document.getElementById('user-pill').style.display = 'flex';
  document.getElementById('btn-admin').style.display = 'none';
  document.body.classList.add('admin-mode');
  if (role === 'super') { document.body.classList.add('super-mode'); renderAccounts(); }
  render();
}

function doLogout() {
  currentUser = null;
  document.getElementById('user-pill').style.display = 'none';
  document.getElementById('btn-admin').style.display = '';
  document.body.classList.remove('admin-mode', 'super-mode');
  cancelEdit();
  render();
}

// ── Filters ──
function buildFilters() {
  document.getElementById('cat-filters').innerHTML = ['全部','大型專案','電商','其他部門'].map(c =>
    `<button class="fbtn${c===activeCat?' on':''}" onclick="setCat('${c}',this)">${c}</button>`
  ).join('');
}
function setCat(c, el) {
  activeCat = c;
  document.querySelectorAll('.fbtn').forEach(b => b.classList.remove('on'));
  el.classList.add('on');
  render();
}

// ── Render ──
function render() {
  const q = (document.getElementById('search').value || '').toLowerCase();
  const CATS = ['大型專案','電商','其他部門'];
  const filtered = items.filter(d => {
    const mc = activeCat === '全部' || d.cat === activeCat;
    const mq = !q || String(d.name).toLowerCase().includes(q) || String(d.sub).toLowerCase().includes(q) || String(d.notes||'').toLowerCase().includes(q);
    return mc && mq;
  });

  if (!filtered.length) {
    document.getElementById('main-list').innerHTML = '<div class="empty">沒有符合的項目</div>';
    return;
  }

  const activeCats = activeCat === '全部' ? CATS : [activeCat];
  let html = '<div class="col-grid">';
  activeCats.forEach(cat => {
    const catItems = filtered.filter(d => d.cat === cat);
    if (!catItems.length) return;
    const subs = [...new Set(catItems.map(d => d.sub))];
    const catLabel = cat === '大型專案' ? '大型跨部門專案' : cat === '電商' ? '電商設計項目' : '內部各部門需求';
    html += `<div class="col-card">
      <div class="col-header">
        <span class="col-cat-badge b-${cat}">${cat}</span>
        <div class="col-title">${catLabel}</div>
      </div>`;
    subs.forEach(sub => {
      const subItems = catItems.filter(d => d.sub === sub);
      html += `<div class="sub-block"><div class="sub-label">${sub}</div>`;
      subItems.forEach(d => {
        const fc = d.freq==='定期'?'f-定期':d.freq==='不定期'?'f-不定期':'f-大型';
        html += `<div class="item-row">
          <span class="item-name">${d.name}${d.notes?` <span class="item-notes">· ${d.notes}</span>`:''}</span>
          <span class="freq-badge ${fc}">${d.freq}</span>
          <button class="act-btn" onclick="startEdit(${d.id})" title="編輯">✏️</button>
          <button class="act-btn danger" onclick="confirmDelete(${d.id})" title="刪除">🗑</button>
        </div>`;
      });
      html += `</div>`;
    });
    html += `</div>`;
  });
  html += '</div>';
  document.getElementById('main-list').innerHTML = html;
}

// ── CRUD ──
async function submitItem() {
  const name = document.getElementById('f-name').value.trim();
  const sub  = document.getElementById('f-sub').value.trim();
  if (!name || !sub) { document.getElementById('form-err').textContent = '請填寫項目名稱與子類'; return; }
  document.getElementById('form-err').textContent = '';
  document.getElementById('submit-btn').textContent = '處理中...';
  document.getElementById('submit-btn').disabled = true;

  const item = { cat:document.getElementById('f-cat').value, sub, name, freq:document.getElementById('f-freq').value, notes:document.getElementById('f-notes').value.trim() };

  try {
    if (editId) {
      item.id = editId;
      await apiPost({ action:'updateItem', item });
      items = items.map(d => d.id == editId ? {...d,...item} : d);
      editId = null;
      document.getElementById('submit-btn').textContent = '新增項目';
      document.getElementById('form-title').textContent = '新增項目';
      document.getElementById('cancel-btn').style.display = 'none';
    } else {
      const res = await apiPost({ action:'addItem', item });
      item.id = res.id;
      items.push(item);
    }
    ['f-name','f-sub','f-notes'].forEach(id => document.getElementById(id).value = '');
    render();
    const msg = document.getElementById('save-msg');
    msg.textContent = '✓ 已儲存'; setTimeout(() => msg.textContent='', 2000);
  } catch(e) {
    document.getElementById('form-err').textContent = '儲存失敗，請再試一次';
  }
  document.getElementById('submit-btn').disabled = false;
  if (!editId) document.getElementById('submit-btn').textContent = '新增項目';
}

function startEdit(id) {
  const d = items.find(x => String(x.id)===String(id)); if (!d) return;
  editId = id;
  document.getElementById('f-cat').value   = d.cat;
  document.getElementById('f-sub').value   = d.sub;
  document.getElementById('f-name').value  = d.name;
  document.getElementById('f-freq').value  = d.freq;
  document.getElementById('f-notes').value = d.notes||'';
  document.getElementById('submit-btn').textContent = '儲存修改';
  document.getElementById('form-title').textContent = `編輯：${d.name}`;
  document.getElementById('cancel-btn').style.display = '';
  window.scrollTo({ top:0, behavior:'smooth' });
  document.getElementById('f-name').focus();
}

function cancelEdit() {
  editId = null;
  ['f-name','f-sub','f-notes'].forEach(id => document.getElementById(id).value = '');
  document.getElementById('submit-btn').textContent = '新增項目';
  document.getElementById('form-title').textContent = '新增項目';
  document.getElementById('cancel-btn').style.display = 'none';
  document.getElementById('form-err').textContent = '';
}

async function confirmDelete(id) {
  const d = items.find(x => String(x.id)===String(id)); if (!d) return;
  if (!confirm(`確定刪除「${d.name}」？`)) return;
  try {
    await apiPost({ action:'deleteItem', id });
    items = items.filter(x => String(x.id)!==String(id));
    render();
  } catch(e) { alert('刪除失敗，請再試一次'); }
}

// ── Accounts ──
function addAccount() {
  const u = document.getElementById('new-username').value.trim();
  const p = document.getElementById('new-password').value.trim();
  const errEl = document.getElementById('acct-err');
  const msgEl = document.getElementById('acct-msg');
  errEl.textContent=''; msgEl.textContent='';
  if (!u||!p) { errEl.textContent='請填寫帳號與密碼'; return; }
  if (u===SUPER.username) { errEl.textContent='此帳號名稱不可使用'; return; }
  const users = loadUsers();
  if (users.find(x=>x.username===u)) { errEl.textContent='此帳號已存在'; return; }
  users.push({username:u,password:p});
  saveUsers(users);
  document.getElementById('new-username').value='';
  document.getElementById('new-password').value='';
  msgEl.textContent='✓ 帳號已建立'; setTimeout(()=>msgEl.textContent='',2000);
  renderAccounts();
}
function deleteAccount(u) {
  if (!confirm(`確定刪除帳號「${u}」？`)) return;
  saveUsers(loadUsers().filter(x=>x.username!==u));
  renderAccounts();
}
function renderAccounts() {
  const users = loadUsers();
  document.getElementById('account-list').innerHTML =
    `<div class="panel-row"><div class="panel-row-name">${SUPER.username}</div><span class="badge-admin">主權限</span></div>` +
    (users.length
      ? users.map(u=>`<div class="panel-row"><div class="panel-row-name">${u.username}</div><span class="badge-user">一般</span><button class="act-btn" style="display:flex" onclick="deleteAccount('${u.username}')" title="刪除">🗑</button></div>`).join('')
      : '<div style="padding:1rem;text-align:center;font-size:13px;color:var(--text-sec)">尚無其他帳號</div>');
}

// ── Init ──
buildFilters();
loadItems();
</script>
