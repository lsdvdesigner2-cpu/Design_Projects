<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>設計部工作看板</title>
<style>
  :root {
    --sidebar-w: 220px;
    --c-bg: #f5f6fa;
    --c-card: #ffffff;
    --c-border: #e4e6ef;
    --c-text: #2d3436;
    --c-muted: #636e72;
    --radius: 10px;
    --shadow: 0 2px 10px rgba(0,0,0,.07);
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: 'Segoe UI','PingFang TC','Microsoft JhengHei',sans-serif;
    background: var(--c-bg); color: var(--c-text);
    display: flex; min-height: 100vh;
  }

  /* ── SIDEBAR ── */
  #sidebar {
    width: var(--sidebar-w); background: #1e2235; color: #c8d0e7;
    display: flex; flex-direction: column;
    position: fixed; top:0; left:0; bottom:0; z-index:100;
    transition: transform .3s ease;
  }
  #sidebar-header { padding: 22px 18px 16px; border-bottom:1px solid rgba(255,255,255,.08); }
  #sidebar-header .logo { font-size:15px; font-weight:700; color:#fff; display:flex; align-items:center; gap:8px; }
  #sidebar-header .logo span { font-size:20px; }
  #sidebar-header .sub { font-size:11px; color:#8895a7; margin-top:4px; }
  nav { flex:1; padding:12px 0; overflow-y:auto; }
  .nav-section-label { font-size:10px; letter-spacing:1px; text-transform:uppercase; color:#5a6378; padding:10px 18px 4px; font-weight:600; }
  .nav-item {
    display:flex; align-items:center; gap:10px;
    padding:9px 18px; cursor:pointer;
    border-left:3px solid transparent;
    transition:all .2s; font-size:13.5px; color:#a0aec0; user-select:none;
  }
  .nav-item:hover { background:rgba(255,255,255,.06); color:#fff; }
  .nav-item.active { color:#fff; border-left-color:var(--accent); background:rgba(255,255,255,.08); }
  .nav-item .dot { width:8px; height:8px; border-radius:50%; background:var(--accent); flex-shrink:0; }

  /* ── MAIN ── */
  #main { margin-left:var(--sidebar-w); flex:1; display:flex; flex-direction:column; min-height:100vh; }

  /* ── TOPBAR ── */
  #topbar {
    background:#fff; border-bottom:1px solid var(--c-border);
    padding:12px 24px; display:flex; align-items:center; gap:12px;
    position:sticky; top:0; z-index:50; box-shadow:var(--shadow);
  }
  #menu-btn { display:none; background:none; border:none; cursor:pointer; font-size:20px; color:var(--c-muted); }
  #topbar-title { font-size:18px; font-weight:700; }
  #topbar-badge { font-size:12px; padding:3px 10px; border-radius:20px; color:#fff; font-weight:600; }
  #topbar-count { font-size:13px; color:var(--c-muted); }
  #topbar-right { margin-left:auto; display:flex; align-items:center; gap:10px; }

  /* login status chip */
  .auth-chip {
    display:flex; align-items:center; gap:6px;
    padding:6px 14px; border-radius:20px; font-size:13px; font-weight:600;
    cursor:pointer; border:none; transition:all .15s;
  }
  .auth-chip.guest {
    background:#f0f2f8; color:var(--c-muted);
  }
  .auth-chip.guest:hover { background:#e0e3ef; color:var(--c-text); }
  .auth-chip.logged-in {
    background:#e8f5e9; color:#2e7d32;
  }
  .btn-logout {
    background:none; border:1.5px solid #e0e3ef; border-radius:8px;
    padding:5px 12px; font-size:12px; color:var(--c-muted);
    cursor:pointer; font-weight:600; transition:all .15s;
  }
  .btn-logout:hover { border-color:#e8613a; color:#e8613a; }

  /* ── CONTENT ── */
  #content { padding:28px; flex:1; }
  .section-header { display:flex; align-items:center; gap:12px; margin-bottom:20px; }
  .section-icon { width:44px; height:44px; border-radius:12px; display:flex; align-items:center; justify-content:center; font-size:20px; }
  .section-title { font-size:22px; font-weight:700; }
  .section-desc { font-size:13px; color:var(--c-muted); margin-top:2px; }

  /* ── CATEGORY BLOCK ── */
  .category-block { background:var(--c-card); border-radius:var(--radius); border:1px solid var(--c-border); margin-bottom:18px; overflow:hidden; box-shadow:var(--shadow); }
  .category-head {
    display:flex; align-items:center; gap:10px;
    padding:13px 16px; cursor:pointer;
    border-bottom:1px solid transparent; transition:background .15s; user-select:none;
  }
  .category-head:hover { background:#f8f9fc; }
  .category-head.open { border-bottom-color:var(--c-border); }
  .cat-color { width:5px; height:28px; border-radius:3px; flex-shrink:0; }
  .cat-name { font-size:15px; font-weight:700; flex:1; }
  .cat-count { font-size:12px; background:#f0f2f8; color:var(--c-muted); padding:2px 9px; border-radius:12px; font-weight:600; }
  .cat-arrow { font-size:12px; color:var(--c-muted); transition:transform .25s; }
  .category-head.open .cat-arrow { transform:rotate(90deg); }
  .category-body { display:none; }
  .category-body.open { display:block; }
  .cat-head-actions { display:flex; gap:4px; margin-left:4px; }

  /* ── ITEMS GRID ── */
  .items-grid {
    display: grid;
    grid-template-columns: repeat(4, 1fr);
    gap: 12px;
    padding: 16px;
  }

  /* ── PROJECT ITEM (card) ── */
  .project-item {
    background: #f8f9fc;
    border-radius: 10px;
    border: 1px solid var(--c-border);
    border-left: 4px solid var(--accent);
    padding: 14px;
    display: flex;
    flex-direction: column;
    gap: 8px;
    transition: box-shadow .15s;
  }
  .project-item:hover { box-shadow: 0 4px 14px rgba(0,0,0,.09); }
  .project-item-header { display:flex; align-items:flex-start; gap:6px; }
  .project-name {
    font-size:14px; font-weight:700; flex:1;
    display:flex; align-items:flex-start; gap:7px; line-height:1.4;
  }
  .project-name::before {
    content:''; display:inline-block; width:7px; height:7px; margin-top:4px;
    border-radius:50%; background:var(--accent); flex-shrink:0;
  }
  .project-note {
    font-size:12.5px; color:#5a6378; line-height:1.7;
    background:#fff; border-radius:6px; padding:8px 10px;
    border-left:3px solid var(--accent); white-space:pre-wrap;
    flex:1;
  }
  .note-label { font-size:10px; font-weight:700; color:var(--c-muted); text-transform:uppercase; letter-spacing:.6px; margin-bottom:2px; }

  /* ── ACTION BUTTONS ── */
  .btn-icon {
    border:none; border-radius:6px; cursor:pointer;
    width:28px; height:28px; display:inline-flex; align-items:center; justify-content:center;
    font-size:14px; transition:all .15s; flex-shrink:0;
  }
  .btn-edit   { background:#eef2ff; color:#3a7bd5; }
  .btn-edit:hover   { background:#3a7bd5; color:#fff; }
  .btn-delete { background:#fff1f0; color:#e8613a; }
  .btn-delete:hover { background:#e8613a; color:#fff; }
  .btn-add {
    background:none; border:1.5px dashed var(--c-border);
    color:var(--c-muted); border-radius:8px; cursor:pointer;
    padding:8px 14px; font-size:13px; width:100%;
    display:flex; align-items:center; justify-content:center; gap:6px;
    transition:all .15s;
  }
  .btn-add:hover { border-color:var(--accent); color:var(--accent); background:#fafbff; }
  .btn-add-cat {
    display:flex; align-items:center; gap:8px;
    border:1.5px dashed var(--c-border); border-radius:var(--radius);
    padding:12px 18px; cursor:pointer; color:var(--c-muted); font-size:13.5px;
    background:var(--c-card); margin-bottom:18px; transition:all .15s;
    box-shadow:var(--shadow); width:100%;
  }
  .btn-add-cat:hover { border-color:var(--accent); color:var(--accent); }

  /* hide when not logged in */
  .auth-only { display:none; }
  body.authenticated .auth-only { display:flex; }
  body.authenticated .auth-only-block { display:block; }
  .auth-only-block { display:none; }

  /* read-only notice */
  .readonly-notice {
    display:flex; align-items:center; gap:8px;
    background:#fffbea; border:1px solid #f6d860; border-radius:8px;
    padding:10px 16px; font-size:13px; color:#7a6000; margin-bottom:20px;
  }
  body.authenticated .readonly-notice { display:none; }

  /* ── OVERVIEW ── */
  .overview-grid { display:grid; grid-template-columns:repeat(auto-fill,minmax(240px,1fr)); gap:16px; margin-bottom:28px; }
  .ov-card {
    border-radius:var(--radius); padding:22px; color:#fff;
    cursor:pointer; transition:transform .15s, box-shadow .15s;
    box-shadow:0 4px 15px rgba(0,0,0,.15);
  }
  .ov-card:hover { transform:translateY(-3px); box-shadow:0 8px 25px rgba(0,0,0,.2); }
  .ov-card .ov-icon { font-size:28px; margin-bottom:10px; }
  .ov-card .ov-name { font-size:17px; font-weight:700; margin-bottom:4px; }
  .ov-card .ov-num  { font-size:28px; font-weight:800; }
  .ov-card .ov-sub  { font-size:12px; opacity:.8; margin-top:2px; }

  /* ── LOGIN MODAL ── */
  .modal-overlay {
    display:none; position:fixed; inset:0;
    background:rgba(15,20,40,.6); z-index:200;
    align-items:center; justify-content:center; padding:16px;
    backdrop-filter:blur(3px);
  }
  .modal-overlay.show { display:flex; }
  .modal {
    background:#fff; border-radius:16px; padding:32px;
    width:100%; max-width:420px; box-shadow:0 24px 64px rgba(0,0,0,.25);
    animation:modalIn .2s ease;
  }
  @keyframes modalIn { from{opacity:0;transform:translateY(-14px)} to{opacity:1;transform:none} }

  /* login modal specific */
  #login-modal .modal { max-width:380px; text-align:center; }
  .login-icon { font-size:44px; margin-bottom:12px; }
  .login-title { font-size:20px; font-weight:800; margin-bottom:4px; }
  .login-sub { font-size:13px; color:var(--c-muted); margin-bottom:28px; }
  .login-field { text-align:left; margin-bottom:16px; }
  .login-field label { font-size:12px; font-weight:600; color:var(--c-muted); text-transform:uppercase; letter-spacing:.4px; display:block; margin-bottom:6px; }
  .login-field input {
    width:100%; border:1.5px solid var(--c-border); border-radius:10px;
    padding:11px 14px; font-size:15px; font-family:inherit;
    transition:border-color .15s; color:var(--c-text); background:#fff;
  }
  .login-field input:focus { outline:none; border-color:#3a7bd5; box-shadow:0 0 0 3px rgba(58,123,213,.12); }
  .login-error { font-size:13px; color:#e8613a; text-align:center; margin-bottom:12px; min-height:18px; }
  .btn-login {
    width:100%; background:linear-gradient(135deg,#3a7bd5,#6fa3ef);
    color:#fff; border:none; border-radius:10px; padding:13px;
    font-size:15px; font-weight:700; cursor:pointer; transition:opacity .15s;
    margin-top:4px;
  }
  .btn-login:hover { opacity:.9; }

  /* edit modal */
  #edit-modal .modal { max-width:500px; }
  .modal-title { font-size:17px; font-weight:700; margin-bottom:20px; display:flex; align-items:center; gap:8px; }
  .modal label { font-size:12px; font-weight:600; color:var(--c-muted); text-transform:uppercase; letter-spacing:.4px; display:block; margin-bottom:6px; }
  .modal input, .modal textarea {
    width:100%; border:1.5px solid var(--c-border); border-radius:8px;
    padding:10px 12px; font-size:14px; font-family:inherit;
    transition:border-color .15s; margin-bottom:16px; color:var(--c-text); background:#fff;
  }
  .modal input:focus, .modal textarea:focus { outline:none; border-color:var(--focus-color,#3a7bd5); }
  .modal textarea { min-height:120px; resize:vertical; line-height:1.6; }
  .modal-actions { display:flex; gap:10px; justify-content:flex-end; margin-top:4px; }
  .btn-cancel { background:#f0f2f8; color:var(--c-muted); border:none; border-radius:8px; padding:9px 20px; cursor:pointer; font-size:14px; font-weight:600; }
  .btn-cancel:hover { background:#e0e3ef; }
  .btn-primary { color:#fff; border:none; border-radius:8px; padding:9px 22px; cursor:pointer; font-size:14px; font-weight:600; opacity:1; transition:opacity .15s; }
  .btn-primary:hover { opacity:.88; }

  /* ── CONFIRM ── */
  #confirm-modal .modal { max-width:380px; }
  .confirm-title { font-size:16px; font-weight:700; margin-bottom:8px; }
  .confirm-msg { font-size:13.5px; color:var(--c-muted); margin-bottom:24px; line-height:1.6; }
  .confirm-actions { display:flex; gap:10px; justify-content:flex-end; }
  .btn-danger { background:#e8613a; color:#fff; border:none; border-radius:8px; padding:9px 22px; cursor:pointer; font-size:14px; font-weight:600; }
  .btn-danger:hover { background:#d0552f; }

  /* ── TOAST ── */
  #toast {
    position:fixed; bottom:24px; right:24px; z-index:500;
    background:#2d3436; color:#fff; padding:12px 20px;
    border-radius:10px; font-size:13.5px; font-weight:500;
    box-shadow:0 4px 20px rgba(0,0,0,.2);
    transform:translateY(80px); opacity:0;
    transition:all .3s ease; pointer-events:none;
  }
  #toast.show { transform:none; opacity:1; }

  /* ── OVERLAY ── */
  #overlay { display:none; position:fixed; inset:0; background:rgba(0,0,0,.4); z-index:90; }
  #overlay.show { display:block; }

  /* ── RESPONSIVE ── */
  @media (max-width:700px) {
    :root { --sidebar-w:0px; }
    #sidebar { width:240px; transform:translateX(-100%); }
    #sidebar.open { transform:translateX(0); }
    #menu-btn { display:block; }
    #main { margin-left:0; }
    #content { padding:14px; }
    #topbar { padding:10px 14px; }
    .items-grid { padding:10px; gap:8px; }
    .overview-grid { grid-template-columns:1fr 1fr; gap:12px; }
    .ov-card { padding:16px; }
    .ov-card .ov-num { font-size:22px; }
    #topbar-count { display:none; }
    .auth-chip span.chip-label { display:none; }
  }
  @media (max-width:1200px) { .items-grid { grid-template-columns: repeat(3, 1fr); } }
  @media (max-width:900px)  { .items-grid { grid-template-columns: repeat(2, 1fr); } }
  @media (max-width:600px)  { .items-grid { grid-template-columns: 1fr; } }
  @media (max-width:420px) { .overview-grid { grid-template-columns:1fr; } }
  ::-webkit-scrollbar { width:6px; }
  ::-webkit-scrollbar-track { background:transparent; }
  ::-webkit-scrollbar-thumb { background:#ccc; border-radius:3px; }
</style>
</head>
<body>

<!-- SIDEBAR -->
<aside id="sidebar">
  <div id="sidebar-header">
    <div class="logo"><span>🎨</span> 設計部看板</div>
    <div class="sub">Design Department Board</div>
  </div>
  <nav id="nav"></nav>
</aside>
<div id="overlay"></div>

<!-- MAIN -->
<main id="main">
  <header id="topbar">
    <button id="menu-btn" onclick="toggleMenu()">☰</button>
    <div id="topbar-title">總覽</div>
    <span id="topbar-badge"></span>
    <span id="topbar-count"></span>
    <div id="topbar-right">
      <!-- shown when NOT logged in -->
      <button class="auth-chip guest" id="btn-login-open" onclick="openLoginModal()">
        🔒 <span class="chip-label">管理員登入</span>
      </button>
      <!-- shown when logged in -->
      <span class="auth-chip logged-in" id="chip-loggedin" style="display:none">
        ✅ <span class="chip-label" id="chip-username"></span>

<!-- ══ LOGIN MODAL ══ -->
<div class="modal-overlay" id="login-modal">
  <div class="modal">
    <div class="login-icon">🔐</div>
    <div class="login-title">管理員登入</div>
    <div class="login-sub">登入後可新增、修改、刪除工作項目</div>
    <div class="login-field">
      <label>帳號</label>
      <input id="login-user" type="text" placeholder="請輸入帳號" autocomplete="username">
    </div>
    <div class="login-field">
      <label>密碼</label>
      <input id="login-pass" type="password" placeholder="請輸入密碼" autocomplete="current-password">
    </div>
    <div class="login-error" id="login-error"></div>
    <button class="btn-login" onclick="doLogin()">登入</button>
    <div style="text-align:center;margin-top:16px">
      <button class="btn-cancel" onclick="closeLoginModal()" style="font-size:13px">取消</button>
    </div>
  </div>
</div>

<!-- ══ EDIT MODAL ══ -->
<div class="modal-overlay" id="edit-modal">
  <div class="modal">
    <div class="modal-title" id="modal-title"></div>
    <div id="modal-body"></div>
    <div class="modal-actions">
      <button class="btn-cancel" onclick="closeEditModal()">取消</button>
      <button class="btn-primary" id="modal-confirm" onclick="modalConfirm()">儲存</button>
    </div>
  </div>
</div>

<!-- ══ CONFIRM MODAL ══ -->
<div class="modal-overlay" id="confirm-modal">
  <div class="modal">
    <div class="confirm-title" id="confirm-title"></div>
    <div class="confirm-msg"   id="confirm-msg"></div>
    <div class="confirm-actions">
      <button class="btn-cancel" onclick="closeConfirm()">取消</button>
      <button class="btn-danger" onclick="confirmOk()">確認刪除</button>
    </div>
  </div>
</div>

<!-- TOAST -->
<div id="toast"></div>

<script>
// ═══════════════════════════════════════════════
//  AUTH CONFIG  (password stored as SHA-256)
// ═══════════════════════════════════════════════
const AUTH = {
  username: 'lsdv.designer',
  // SHA-256 of "54708191"
  passwordHash: '4ddac8b8c093600c62271e63812423039bd4d315c30d8e43a0cc5be8dede8d3f'
};
const SESSION_KEY = 'design_board_auth';

async function sha256(str) {
  const buf = await crypto.subtle.digest('SHA-256', new TextEncoder().encode(str));
  return Array.from(new Uint8Array(buf)).map(b=>b.toString(16).padStart(2,'0')).join('');
}

function isLoggedIn() { return sessionStorage.getItem(SESSION_KEY) === AUTH.username; }

function setAuthUI() {
  const loggedIn = isLoggedIn();
  document.body.classList.toggle('authenticated', loggedIn);
  document.getElementById('btn-login-open').style.display = loggedIn ? 'none' : '';
  document.getElementById('chip-loggedin').style.display  = loggedIn ? '' : 'none';
  document.getElementById('btn-logout').style.display     = loggedIn ? '' : 'none';
  document.getElementById('chip-username').textContent    = AUTH.username;
}

async function doLogin() {
  const user = document.getElementById('login-user').value.trim();
  const pass = document.getElementById('login-pass').value;
  const errEl = document.getElementById('login-error');
  errEl.textContent = '';

  if (!user || !pass) { errEl.textContent = '請輸入帳號與密碼'; return; }

  const hash = await sha256(pass);
  if (user === AUTH.username && hash === AUTH.passwordHash) {
    sessionStorage.setItem(SESSION_KEY, AUTH.username);
    closeLoginModal();
    setAuthUI();
    if (currentSecId) renderDetail(); else renderOverview();
    showToast('✅ 登入成功，歡迎 ' + AUTH.username);
  } else {
    errEl.textContent = '帳號或密碼錯誤，請再試一次';
    document.getElementById('login-pass').value = '';
    document.getElementById('login-pass').focus();
  }
}

function logout() {
  sessionStorage.removeItem(SESSION_KEY);
  setAuthUI();
  if (currentSecId) renderDetail(); else renderOverview();
  showToast('已登出');
}

function openLoginModal() {
  document.getElementById('login-user').value = '';
  document.getElementById('login-pass').value = '';
  document.getElementById('login-error').textContent = '';
  document.getElementById('login-modal').classList.add('show');
  setTimeout(()=>document.getElementById('login-user').focus(), 80);
}
function closeLoginModal() { document.getElementById('login-modal').classList.remove('show'); }

// ═══════════════════════════════════════════════
//  DEFAULT DATA
// ═══════════════════════════════════════════════
const DEFAULT_DATA = [
  {
    id:'ecommerce', label:'電商處', icon:'🛒', color:'#e8613a',
    bg:'linear-gradient(135deg,#e8613a,#f0a06a)',
    categories:[
      { id:'ec-banner', name:'Banner', items:[
        { id:'i1', name:'購物網 Banner', note:`製作官方購物網站首頁及活動頁 Banner。\n尺寸規格：1920×600px（電腦版）、750×400px（手機版）\n交件格式：JPG / PNG，72dpi\n備註：請確認促銷文案與商品圖由行銷部提供` },
        { id:'i2', name:'品牌代操 Banner', note:`依各品牌視覺規範製作促銷活動 Banner。\n需依品牌提供之 CI 色彩與字型執行\n交件格式：JPG，尺寸依各平台規定\n備註：代操品牌清單請洽業務確認` },
        { id:'i3', name:'蝦皮 Banner', note:`蝦皮賣場活動 Banner 製作。\n尺寸：1200×300px（主圖）、800×800px（商品圖）\n交件格式：JPG / PNG\n備註：需配合蝦皮活動檔期提前 3 個工作天完稿` }
      ]},

// ═══════════════════════════════════════════════
//  DATA PERSISTENCE
// ═══════════════════════════════════════════════
const STORAGE_KEY = 'design_board_v2';
let DATA = loadData();
function loadData() {
  try { const s = localStorage.getItem(STORAGE_KEY); return s ? JSON.parse(s) : JSON.parse(JSON.stringify(DEFAULT_DATA)); }
  catch(e) { return JSON.parse(JSON.stringify(DEFAULT_DATA)); }
}
function saveData() { localStorage.setItem(STORAGE_KEY, JSON.stringify(DATA)); }
function uid() { return 'id-' + Math.random().toString(36).slice(2,9) + Date.now().toString(36); }

// ═══════════════════════════════════════════════
//  STATE
// ═══════════════════════════════════════════════
let currentSecId = null;

// ═══════════════════════════════════════════════
//  AUTH GUARD
// ═══════════════════════════════════════════════
function requireAuth(fn) {
  if (!isLoggedIn()) { openLoginModal(); return; }
  fn();
}

// ═══════════════════════════════════════════════
//  NAV
// ═══════════════════════════════════════════════
function buildNav() {
  const nav = document.getElementById('nav');
  let html = `
    <div class="nav-item active" onclick="showOverview(this)" style="--accent:#8895a7" data-page="overview">
      <span style="font-size:16px">📊</span> 總覽
    </div>
    <div class="nav-section-label">業務區塊</div>
  `;
  DATA.forEach(sec => {
    const total = sec.categories.reduce((s,c)=>s+c.items.length,0);
    html += `
      <div class="nav-item" onclick="showSection('${sec.id}',this)" style="--accent:${sec.color}" data-page="${sec.id}">
        <span class="dot"></span> ${sec.label}
        <span style="margin-left:auto;font-size:11px;opacity:.6">${total}</span>
      </div>
    `;
  });
  nav.innerHTML = html;
}

// ═══════════════════════════════════════════════
//  OVERVIEW
// ═══════════════════════════════════════════════
function showOverview(el) {
  setActive(el || document.querySelector('[data-page="overview"]'));
  document.getElementById('overview-page').style.display = '';
  document.getElementById('detail-page').style.display   = 'none';
  document.getElementById('topbar-title').textContent = '總覽';
  document.getElementById('topbar-badge').textContent = '';
  document.getElementById('topbar-badge').style.cssText = '';
  document.getElementById('topbar-count').textContent = '';
  currentSecId = null;
  renderOverview();
  closeMenu();
}

function renderOverview() {
  const page  = document.getElementById('overview-page');
  const total = DATA.reduce((s,sec)=>s+sec.categories.reduce((ss,c)=>ss+c.items.length,0),0);
  let html = `
    <div class="section-header" style="margin-bottom:24px">
      <div class="section-icon" style="background:#f0f2f8;font-size:22px">📊</div>
      <div>
        <div class="section-title">設計部工作看板</div>
        <div class="section-desc">共 ${total} 個工作項目・3 大業務方向</div>
      </div>
    </div>
    <div class="overview-grid">
  `;
  DATA.forEach(sec=>{
    const count = sec.categories.reduce((s,c)=>s+c.items.length,0);
    html += `
      <div class="ov-card" style="background:${sec.bg}" onclick="showSection('${sec.id}')">
        <div class="ov-icon">${sec.icon}</div>
        <div class="ov-name">${sec.label}</div>
        <div class="ov-num">${count}</div>
        <div class="ov-sub">${sec.categories.length} 個類別</div>
      </div>
    `;
  });
  html += `</div>`;

  page.innerHTML = html;
}

// ═══════════════════════════════════════════════
//  DETAIL
// ═══════════════════════════════════════════════
function showSection(secId, el) {
  currentSecId = secId;
  setActive(el || document.querySelector(`[data-page="${secId}"]`));
  document.getElementById('overview-page').style.display = 'none';
  document.getElementById('detail-page').style.display   = '';
  renderDetail();
  window.scrollTo(0,0);
  closeMenu();
}

function renderDetail() {
  const sec   = DATA.find(s=>s.id===currentSecId);
  const total = sec.categories.reduce((s,c)=>s+c.items.length,0);
  const auth  = isLoggedIn();

  document.getElementById('topbar-title').textContent = sec.label;
  document.getElementById('topbar-badge').textContent = sec.label;
  document.getElementById('topbar-badge').style.cssText = `background:${sec.color}`;
  document.getElementById('topbar-count').textContent   = `${total} 個項目`;

  // readonly notice
  const notice = auth ? '' : `
    <div class="readonly-notice">
      🔒 目前為瀏覽模式，<a href="#" onclick="openLoginModal();return false;" style="color:inherit;font-weight:700">管理員登入</a>後可編輯項目
    </div>`;

  let html = notice + `
    <div class="section-header">
      <div class="section-icon" style="background:${sec.color}22">${sec.icon}</div>
      <div>
        <div class="section-title" style="color:${sec.color}">${esc(sec.label)}</div>
        <div class="section-desc">${sec.categories.length} 個類別・${total} 個工作項目</div>
      </div>
    </div>
  `;

  sec.categories.forEach((cat, ci)=>{
    const bodyId = `body-${ci}`;
    const headId = `head-${ci}`;
    const editBtns = auth ? `
      <div class="cat-head-actions" onclick="event.stopPropagation()">
        <button class="btn-icon btn-edit"   title="重新命名" onclick="renameCat('${cat.id}')">✏️</button>
        <button class="btn-icon btn-delete" title="刪除類別" onclick="deleteCat('${cat.id}')">🗑️</button>
      </div>` : '';

    html += `
      <div class="category-block" id="cat-block-${cat.id}">
        <div class="category-head open" id="${headId}" onclick="toggleCat(event,'${headId}','${bodyId}')">
          <div class="cat-color" style="background:${sec.color}"></div>
          <div class="cat-name">${esc(cat.name)}</div>
          <span class="cat-count">${cat.items.length}</span>
          ${editBtns}
          <span class="cat-arrow">▶</span>
        </div>
        <div class="category-body open" id="${bodyId}">
    `;

    html += `<div class="items-grid">`;
    cat.items.forEach(item=>{
      const itemBtns = auth ? `
        <button class="btn-icon btn-edit"   title="編輯"   onclick="editItem('${cat.id}','${item.id}')">✏️</button>
        <button class="btn-icon btn-delete" title="刪除"   onclick="deleteItem('${cat.id}','${item.id}')">🗑️</button>` : '';
      html += `
        <div class="project-item" style="--accent:${sec.color}" id="item-${item.id}">
          <div class="project-item-header">
            <div class="project-name">${esc(item.name)}</div>
            ${itemBtns}
          </div>
          <div class="note-label">📝 備註說明</div>
          <div class="project-note">${esc(item.note)||'<span style="opacity:.4">（尚無備註）</span>'}</div>
        </div>`;
    });
    html += `</div>`;

    const addItemBtn = auth ? `
      <div style="padding:10px 16px 14px">
        <button class="btn-add" onclick="addItem('${cat.id}')">＋ 新增項目</button>
      </div>` : '';
    html += addItemBtn + `</div></div>`;
  });

  const addCatBtn = auth ? `
    <button class="btn-add-cat" onclick="addCategory()">
      <span style="font-size:18px;color:${sec.color}">＋</span>
      <span>新增類別</span>
    </button>` : '';
  html += addCatBtn;

  document.getElementById('detail-page').innerHTML = html;
}

function toggleCat(e, headId, bodyId) {
  if (e.target.closest('.cat-head-actions')) return;
  document.getElementById(headId).classList.toggle('open');
  document.getElementById(bodyId).classList.toggle('open');
}

// ═══════════════════════════════════════════════
//  CRUD — ITEM
// ═══════════════════════════════════════════════
function addItem(catId) {
  requireAuth(()=>{
    openEditModal({
      title:'➕ 新增項目', color:currentColor(),
      fields:[
        { label:'項目名稱', id:'fname', type:'input',    placeholder:'例：活動主視覺設計' },
        { label:'備註說明', id:'fnote', type:'textarea',  placeholder:'請填入工作規格、注意事項…' }
      ],
      onConfirm(){
        const name = val('fname').trim();
        if(!name){ showToast('請輸入項目名稱'); return false; }
        const sec = DATA.find(s=>s.id===currentSecId);
        const cat = sec.categories.find(c=>c.id===catId);
        cat.items.push({ id:uid(), name, note:val('fnote') });
        saveAndRefresh('項目已新增 ✓');
      }
    });
  });
}

function editItem(catId, itemId) {
  requireAuth(()=>{
    const sec  = DATA.find(s=>s.id===currentSecId);
    const cat  = sec.categories.find(c=>c.id===catId);
    const item = cat.items.find(i=>i.id===itemId);
    openEditModal({
      title:'✏️ 編輯項目', color:currentColor(),
      fields:[
        { label:'項目名稱', id:'fname', type:'input',   value:item.name },
        { label:'備註說明', id:'fnote', type:'textarea', value:item.note }
      ],
      onConfirm(){
        const name = val('fname').trim();
        if(!name){ showToast('請輸入項目名稱'); return false; }
        item.name = name; item.note = val('fnote');
        saveAndRefresh('已儲存 ✓');
      }
    });
  });
}

function deleteItem(catId, itemId) {
  requireAuth(()=>{
    const sec  = DATA.find(s=>s.id===currentSecId);
    const cat  = sec.categories.find(c=>c.id===catId);
    const item = cat.items.find(i=>i.id===itemId);
    openConfirm(`刪除「${item.name}」？`, `此操作無法復原，確定要刪除這個項目嗎？`, ()=>{
      cat.items = cat.items.filter(i=>i.id!==itemId);
      saveAndRefresh('項目已刪除');
    });
  });
}

// ═══════════════════════════════════════════════
//  CRUD — CATEGORY
// ═══════════════════════════════════════════════
function addCategory() {
  requireAuth(()=>{
    openEditModal({
      title:'📁 新增類別', color:currentColor(),
      fields:[{ label:'類別名稱', id:'fname', type:'input', placeholder:'例：品牌形象' }],
      onConfirm(){
        const name = val('fname').trim();
        if(!name){ showToast('請輸入類別名稱'); return false; }
        DATA.find(s=>s.id===currentSecId).categories.push({ id:uid(), name, items:[] });
        saveAndRefresh('類別已新增 ✓');
      }
    });
  });
}

function renameCat(catId) {
  requireAuth(()=>{
    const cat = DATA.find(s=>s.id===currentSecId).categories.find(c=>c.id===catId);
    openEditModal({
      title:'✏️ 重新命名類別', color:currentColor(),
      fields:[{ label:'類別名稱', id:'fname', type:'input', value:cat.name }],
      onConfirm(){
        const name = val('fname').trim();
        if(!name){ showToast('請輸入類別名稱'); return false; }
        cat.name = name; saveAndRefresh('類別已更新 ✓');
      }
    });
  });
}

function deleteCat(catId) {
  requireAuth(()=>{
    const sec = DATA.find(s=>s.id===currentSecId);
    const cat = sec.categories.find(c=>c.id===catId);
    openConfirm(`刪除類別「${cat.name}」？`,
      `此類別內含 ${cat.items.length} 個項目，刪除後無法復原。確定繼續嗎？`, ()=>{
      sec.categories = sec.categories.filter(c=>c.id!==catId);
      saveAndRefresh('類別已刪除');
    });
  });
}

// ═══════════════════════════════════════════════
//  EDIT MODAL
// ═══════════════════════════════════════════════
let _modalAction = null;

function openEditModal({title, color, fields, onConfirm}) {
  _modalAction = onConfirm;
  document.getElementById('modal-title').innerHTML = title;
  document.getElementById('modal-confirm').style.background = color || '#3a7bd5';
  document.documentElement.style.setProperty('--focus-color', color || '#3a7bd5');
  let body = '';
  fields.forEach(f=>{
    body += `<label>${f.label}</label>`;
    if(f.type==='input')    body += `<input id="${f.id}" type="text" value="${esc(f.value||'')}" placeholder="${esc(f.placeholder||'')}">`;
    if(f.type==='textarea') body += `<textarea id="${f.id}" placeholder="${esc(f.placeholder||'')}">${esc(f.value||'')}</textarea>`;
  });
  document.getElementById('modal-body').innerHTML = body;
  document.getElementById('edit-modal').classList.add('show');
  setTimeout(()=>{ const el=document.querySelector('#modal-body input,#modal-body textarea'); if(el) el.focus(); }, 60);
}
function closeEditModal() { document.getElementById('edit-modal').classList.remove('show'); _modalAction=null; }
function modalConfirm()   { if(_modalAction && _modalAction()!==false) closeEditModal(); }

// ═══════════════════════════════════════════════
//  CONFIRM
// ═══════════════════════════════════════════════
let _confirmAction = null;
function openConfirm(title, msg, onOk) {
  _confirmAction = onOk;
  document.getElementById('confirm-title').textContent = title;
  document.getElementById('confirm-msg').textContent   = msg;
  document.getElementById('confirm-modal').classList.add('show');
}
function closeConfirm() { document.getElementById('confirm-modal').classList.remove('show'); _confirmAction=null; }
function confirmOk()    { if(_confirmAction) _confirmAction(); closeConfirm(); }

// ═══════════════════════════════════════════════
//  TOAST
// ═══════════════════════════════════════════════
let _toastTimer;
function showToast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg; t.classList.add('show');
  clearTimeout(_toastTimer);
  _toastTimer = setTimeout(()=>t.classList.remove('show'), 2400);
}

// ═══════════════════════════════════════════════
//  HELPERS
// ═══════════════════════════════════════════════
function saveAndRefresh(msg) {
  saveData(); buildNav();
  if(currentSecId) renderDetail(); else renderOverview();
  showToast(msg); closeEditModal();
}
function currentColor() { const s=DATA.find(x=>x.id===currentSecId); return s?s.color:'#3a7bd5'; }
function val(id) { const el=document.getElementById(id); return el?el.value:''; }
function esc(s) { return (s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;'); }
function setActive(el) { document.querySelectorAll('.nav-item').forEach(n=>n.classList.remove('active')); if(el) el.classList.add('active'); }

//  MOBILE
// ═══════════════════════════════════════════════
function toggleMenu() { document.getElementById('sidebar').classList.toggle('open'); document.getElementById('overlay').classList.toggle('show'); }
function closeMenu()  { document.getElementById('sidebar').classList.remove('open'); document.getElementById('overlay').classList.remove('show'); }
document.getElementById('overlay').addEventListener('click', closeMenu);

// ═══════════════════════════════════════════════
//  KEYBOARD
// ═══════════════════════════════════════════════
document.addEventListener('keydown', e=>{
  if(e.key==='Escape') { closeLoginModal(); closeEditModal(); closeConfirm(); }
  if(e.key==='Enter') {
    if(document.getElementById('login-modal').classList.contains('show')) { doLogin(); return; }
    if(document.getElementById('edit-modal').classList.contains('show') && document.activeElement.tagName!=='TEXTAREA') { modalConfirm(); }
  }
});
// click outside modal to close
['login-modal','edit-modal','confirm-modal'].forEach(id=>{
  document.getElementById(id).addEventListener('click', e=>{ if(e.target.id===id) { closeLoginModal(); closeEditModal(); closeConfirm(); } });
});

// ═══════════════════════════════════════════════
//  INIT
// ═══════════════════════════════════════════════
buildNav();
setAuthUI();
showOverview();
</script>
